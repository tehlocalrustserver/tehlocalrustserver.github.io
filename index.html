<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#060606;
    color:white;
    overflow-x:hidden;
}

header{
    min-height:100vh;
    background:
    radial-gradient(circle at top, rgba(255,120,0,.25), transparent 45%),
    linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.92)),
    url("20260511013255_1.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    padding:30px 7%;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(15,15,15,.75);
    backdrop-filter:blur(10px);
    padding:18px 30px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.05);
}

.logo{
    font-size:30px;
    font-weight:900;
    color:#ff7b00;
    text-transform:uppercase;
    letter-spacing:2px;
}

nav ul{
    display:flex;
    list-style:none;
    gap:35px;
}

nav a{
    color:#d8d8d8;
    text-decoration:none;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:1px;
    transition:.25s;
}

nav a:hover{
    color:#ff7b00;
}

.hero{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    max-width:750px;
}

.hero h1{
    font-size:96px;
    line-height:.9;
    margin-bottom:25px;
    font-weight:900;
    text-transform:uppercase;
}

.hero p{
    color:#bcbcbc;
    font-size:20px;
    line-height:1.8;
    margin-bottom:40px;
}

.btn{
    background:#ff7b00;
    color:white;
    text-decoration:none;
    padding:18px 42px;
    border-radius:100px;
    font-weight:bold;
    border:none;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 10px 35px rgba(255,123,0,.3);
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 15px 40px rgba(255,123,0,.45);
}

section{
    padding:120px 7%;
}

.section-title{
    text-align:center;
    font-size:58px;
    margin-bottom:60px;
    text-transform:uppercase;
    font-weight:900;
}

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.card{
    background:linear-gradient(145deg,#111,#1b1b1b);
    padding:45px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,.05);
    position:relative;
    overflow:hidden;
    transition:.3s;
}

.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:5px;
    background:#ff7b00;
}

.card:hover{
    transform:translateY(-10px) rotate(-1deg);
}

.card h3{
    font-size:28px;
    margin-bottom:20px;
    color:#ff7b00;
}

.card p{
    color:#c8c8c8;
    line-height:1.8;
}

.server-info{
    background:#0b0b0b;
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.info-box{
    background:#131313;
    padding:40px;
    border-radius:24px;
    text-align:center;
    border:1px solid rgba(255,255,255,.05);
    transition:.25s;
}

.info-box:hover{
    transform:translateY(-8px);
    border-color:#ff7b00;
}

.info-box span{
    display:block;
    color:#888;
    margin-bottom:15px;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:14px;
}

.info-box h3{
    font-size:32px;
}

.store{
    background:linear-gradient(to bottom,#070707,#111);
}

.vip-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:35px;
}

.store-box{
    background:#121212;
    padding:50px 35px;
    border-radius:30px;
    text-align:center;
    border:1px solid rgba(255,255,255,.05);
    transition:.3s;
    position:relative;
}

.store-box:hover{
    transform:translateY(-12px) scale(1.02);
    border-color:#ff7b00;
}

.store-box h3{
    font-size:30px;
    margin-bottom:15px;
}

.price{
    font-size:64px;
    font-weight:900;
    color:#ff7b00;
    margin:25px 0;
}

.store-box ul{
    list-style:none;
    margin-bottom:35px;
}

.store-box li{
    margin:14px 0;
    color:#c9c9c9;
    font-size:17px;
}

.status{
    margin-top:20px;
    color:#ffb15c;
    font-weight:bold;
}

.discord{
    text-align:center;
    background:#090909;
}

.discord p{
    font-size:20px;
    color:#c5c5c5;
    margin:20px auto 40px;
    max-width:700px;
    line-height:1.8;
}

footer{
    text-align:center;
    padding:40px;
    color:#666;
    background:black;
    border-top:1px solid rgba(255,255,255,.05);
}

@media(max-width:768px){

.hero h1{
    font-size:58px;
}

.section-title{
    font-size:42px;
}

nav{
    flex-direction:column;
    gap:20px;
}

nav ul{
    flex-wrap:wrap;
    justify-content:center;
}

.hero{
    padding-top:80px;
}

.price{
    font-size:48px;
}
}

</style>
